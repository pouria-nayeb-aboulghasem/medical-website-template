<!doctype html>
<html lang="en-US" dir="ltr">

<head>

  <!-- general -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta charset="UTF-8" />

  <!-- favicon -->
  <link rel="icon" type="image/png" href="/favicon.png" />

  <!-- styles -->
  <link rel="stylesheet" href="src/assets/css/remixicon.css" />
  <link rel="stylesheet" href="src/assets/css/swiper-bundle.min.css" />
  <link rel="stylesheet" href="src/style.css" />

  <!-- seo -->
  <title>Medical website template</title>

</head>

<body class="bg-gray-100 text-gray-600">

  <header class="fixed top-0 left-0 w-full px-3 bg-white shadow">
    <nav class="flex justify-between h-12 items-center container mx-auto md:h-14">
      <!-- logo -->
      <a href="#" class="font-bold flex gap-2">
        <i class="ri-stethoscope-line"></i> Medical
      </a>

      <!-- menu -->
      <div id="menu"
        class="fixed -top-full left-0 py-10 w-full bg-white transition-all duration-300 shadow md:static md:py-0 md:bg-transparent md:shadow-none">
        <!-- menu content -->
        <ul class="flex flex-col items-center gap-4 md:flex-row md:justify-end md:mr-8 md:gap-8">
          <li>
            <a href="#home" class="hover:text-blue-500 transition duration-300">Home</a>
          </li>
          <li>
            <a href="#delivery" class="hover:text-blue-500 transition duration-300">Delivery</a>
          </li>
          <li>
            <a href="#about" class="hover:text-blue-500 transition duration-300">About</a>
          </li>
          <li>
            <a href="#price" class="hover:text-blue-500 transition duration-300">Price</a>
          </li>
          <li>
            <a href="#contact" class="hover:text-blue-500 transition duration-300">Contact</a>
          </li>
        </ul>

        <!-- close mobile menu -->
        <div id="close-mobile-menu" class="absolute top-2 right-4 font-bold cursor-pointer md:hidden">
          <i class="ri-close-large-line"></i>
        </div>
      </div>

      <!-- actions -->
      <div class="flex gap-2">
        <!-- toggle theme -->
        <i id="toggle-theme" class="ri-moon-line font-bold cursor-pointer"></i>

        <!-- open mobile menu -->
        <i id="open-mobile-menu" class="ri-menu-line font-bold cursor-pointer md:hidden"></i>
      </div>
    </nav>
  </header>



  <script src="src/assets/js/swiper-bundle.min.js"></script>
  <script src="src/script.js"></script>
</body>

</html>
